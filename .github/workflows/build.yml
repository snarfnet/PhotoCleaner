name: Build and Upload to App Store

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

    - name: Import distribution certificate
      env:
        DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERT_PATH="$RUNNER_TEMP/distribution.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        echo "$DIST_CERT_BASE64" | base64 -D > "$CERT_PATH"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -k "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security find-identity -v -p codesigning

    - name: Install App Store provisioning profile
      run: |
        gem install fastlane --no-document
        python3 - <<'PY'
        import json
        from pathlib import Path

        key = Path.home().joinpath(".appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8").read_text()
        Path("asc_api_key.json").write_text(json.dumps({
            "key_id": "WDXGY9WX55",
            "issuer_id": "2be0734f-943a-4d61-9dc9-5d9045c46fec",
            "key": key,
            "in_house": False
        }))
        PY

        PROFILE_DIR="$RUNNER_TEMP/profiles"
        PROFILE_PATH="$PROFILE_DIR/PhotoCleaner_AppStore.mobileprovision"
        mkdir -p "$PROFILE_DIR"

        fastlane sigh \
          --api_key_path asc_api_key.json \
          --app_identifier com.tokyonasu.pictureOsouji \
          --team_id 83VGKGSQUH \
          --output_path "$PROFILE_DIR" \
          --filename PhotoCleaner_AppStore.mobileprovision \
          --force

        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
        cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
        echo "PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme PhotoCleaner \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/PhotoCleaner.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPECIFIER" \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        cat > export_options.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>destination</key><string>export</string>
          <key>teamID</key><string>83VGKGSQUH</string>
        </dict></plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath build/PhotoCleaner.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Upload IPA
      run: |
        xcrun altool --upload-app \
          -f build/export/PhotoCleaner.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec
