name: PhotoCleaner
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH

targets:
  PhotoCleaner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - PhotoCleaner
    settings:
      base:
        PRODUCT_NAME: PhotoCleaner
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.photoCleaner
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: PhotoCleaner/Resources/Info.plist
    info:
      path: PhotoCleaner/Resources/Info.plist
      properties:
        CFBundleDisplayName: "ピクチャおそうじ"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.photography
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "類似した写真を検出するために写真ライブラリへのアクセスが必要です。"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Light
